<body>
<header>

            <a href="index.html#inicio">Inicio</a>

            <a href="index.html#relajacion">Relajación</a>

    </footer>

   <script>
class ThemeManager {
    constructor() {
        this.theme = localStorage.getItem('serenidad_theme') || 'light';
        this.init();
    }

    init() {
        this.applyTheme();

        const themeToggle = document.getElementById('themeToggle');

        if (themeToggle) {
            themeToggle.addEventListener('click', () => this.toggleTheme());
        }
    }

    toggleTheme() {
        this.theme = this.theme === 'light' ? 'dark' : 'light';

        this.applyTheme();

        localStorage.setItem('serenidad_theme', this.theme);
    }

    applyTheme() {
        document.documentElement.setAttribute('data-theme', this.theme);

        const toggle = document.getElementById('themeToggle');

        if (toggle) {
            toggle.textContent = this.theme === 'light' ? '🌙' : '☀️';
        }
    }
}

class MobileMenuManager {
    constructor() {
        this.menuToggle = document.getElementById('menuToggle');
        this.navLinks = document.getElementById('navLinks');
        this.links = document.querySelectorAll('.nav-links a');

        this.init();
    }

    init() {
        if (!this.menuToggle || !this.navLinks) return;

        this.menuToggle.addEventListener('click', () => this.toggleMenu());

        this.links.forEach(link => {
            link.addEventListener('click', () => this.closeMenu());
        });
    }

    toggleMenu() {
        this.menuToggle.classList.toggle('open');
        this.navLinks.classList.toggle('open');
    }

    closeMenu() {
        this.menuToggle.classList.remove('open');
        this.navLinks.classList.remove('open');
    }
}

document.addEventListener('DOMContentLoaded', () => {
    new ThemeManager();
    new MobileMenuManager();
});
</script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
     <script src="script.js"></script>
